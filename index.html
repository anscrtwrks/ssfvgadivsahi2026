<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>blaladk</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#050505;
    --card:rgba(255,255,255,0.05);
    --border:rgba(255,255,255,0.08);
    --text:#f5f5f5;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    font-size:16px;
}

body{

    min-height:100vh;
    min-height:100dvh;

    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:
    max(20px, env(safe-area-inset-top))
    20px
    max(20px, env(safe-area-inset-bottom));

    background:
    radial-gradient(circle at top left,
    rgba(255,255,255,0.08),
    transparent 30%),

    radial-gradient(circle at bottom right,
    rgba(255,255,255,0.05),
    transparent 30%),

    linear-gradient(135deg,#050505,#101010,#171717);

    font-family:'Inter',sans-serif;

    color:var(--text);

    position:relative;
}

/* TEXTURE */

body::before{

    content:"";

    position:absolute;
    inset:0;

    background-image:
    radial-gradient(rgba(255,255,255,0.035) 1px,
    transparent 1px);

    background-size:3px 3px;

    opacity:.15;

    pointer-events:none;
}

/* GLOWS */

.glow{

    position:absolute;

    width:40vw;
    height:40vw;

    min-width:220px;
    min-height:220px;

    max-width:500px;
    max-height:500px;

    border-radius:50%;

    filter:blur(100px);

    background:rgba(255,255,255,0.06);

    pointer-events:none;
}

.glow1{
    top:-15%;
    left:-10%;
}

.glow2{
    bottom:-15%;
    right:-10%;
}

/* CARD */

.card{

    width:min(920px,100%);

    padding:
    clamp(28px,5vw,70px);

    border-radius:32px;

    background:var(--card);

    border:1px solid var(--border);

    backdrop-filter:blur(18px);

    -webkit-backdrop-filter:blur(18px);

    box-shadow:
    0 10px 40px rgba(0,0,0,0.45),
    inset 0 0 0 1px rgba(255,255,255,0.03);

    text-align:center;

    position:relative;

    overflow:hidden;

    animation:fadeUp 1s ease;
}

/* INNER LIGHT */

.card::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
    135deg,
    rgba(255,255,255,0.06),
    transparent 30%);

    pointer-events:none;
}

/* QUOTE MARK */

.quote-mark{

    font-size:
    clamp(4rem,10vw,7rem);

    line-height:1;

    opacity:.14;

    margin-bottom:10px;

    font-family:'Cormorant Garamond',serif;
}

/* QUOTE */

.quote{

    font-family:'Cormorant Garamond',serif;

    font-size:
    clamp(2rem,5vw,4.5rem);

    line-height:1.25;

    font-weight:500;

    letter-spacing:.2px;

    color:var(--text);

    text-shadow:
    0 0 25px rgba(255,255,255,0.05);

    min-height:
    clamp(140px,30vh,240px);

    display:flex;
    align-items:center;
    justify-content:center;

    transition:.35s ease;

    padding-inline:10px;
}

/* FOOTER */

.footer{

    margin-top:28px;

    font-size:
    clamp(.7rem,2vw,.85rem);

    letter-spacing:4px;

    text-transform:uppercase;

    opacity:.45;
}

/* BUTTON */

.btn{

    margin-top:38px;

    border:none;

    outline:none;

    cursor:pointer;

    padding:
    14px 28px;

    border-radius:999px;

    background:
    rgba(255,255,255,0.07);

    border:1px solid rgba(255,255,255,0.1);

    color:white;

    font-size:.85rem;

    font-weight:500;

    letter-spacing:2px;

    text-transform:uppercase;

    transition:.3s ease;

    backdrop-filter:blur(10px);

    -webkit-tap-highlight-color:transparent;
}

.btn:hover{

    transform:translateY(-2px);

    background:
    rgba(255,255,255,0.12);

    box-shadow:
    0 10px 30px rgba(255,255,255,0.08);
}

.btn:active{
    transform:scale(.97);
}

/* ANIMATION */

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* SMALL DEVICES */

@media (max-width:600px){

    .card{
        border-radius:26px;
    }

    .footer{
        letter-spacing:3px;
    }

    .btn{
        width:100%;
    }

}

/* LANDSCAPE MOBILE */

@media (max-height:500px){

    body{
        padding:20px;
    }

    .quote{
        min-height:auto;
    }

    .btn{
        margin-top:20px;
    }

}

</style>
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="card">

    <div class="quote-mark">“</div>

    <div class="quote" id="quote"></div>

    <div class="footer">
        SCAN • FEEL • SHARE
    </div>

  

</div>

<script>

const quotes = [

"Creativity begins where comfort ends.",

"Create what the world didn’t know it needed.",

"Your imagination is your greatest luxury.",

"Art starts where logic gets tired.",

"Some ideas deserve silence before applause.",

"Originality is the loudest form of confidence.",

"Beautiful things are born from strange minds.",

"Think deeply. Create fearlessly.",

"Creativity never asks for permission.",

"Dream in aesthetics. Build in reality.",

"Elegance is intelligence with taste.",

"The future belongs to creative thinkers.",

"Every masterpiece once looked impossible.",

"Different minds build unforgettable worlds.",

"Design is emotion made visible.",

"Stay rare in a world of copies.",

"Minimal ideas can create maximum impact.",

"Art is the luxury of expression.",

"Some visions are too powerful to explain.",

"Create slowly. Create meaningfully."

];

function generateQuote(){

    const random =
    quotes[Math.floor(Math.random() * quotes.length)];

    const quote =
    document.getElementById("quote");

    quote.style.opacity = 0;
    quote.style.transform = "translateY(10px)";

    setTimeout(()=>{

        quote.innerText = random;

        quote.style.opacity = 1;
        quote.style.transform = "translateY(0px)";

    },250);
}

generateQuote();

</script>

</body>
</html>
